name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'
      - '.github/workflows/helm-publish.yml'

env:
  REGISTRY: ghcr.io

jobs:
  helm:
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate semver from conventional commits
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: false
          tag_prefix: helm-v
          default_bump: patch

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package Helm chart
        run: |
          helm package helm \
            --version ${{ steps.version.outputs.new_version }} \
            --app-version ${{ steps.version.outputs.new_version }}

      - name: Push Helm chart to GHCR
        run: |
          helm push containrdog-${{ steps.version.outputs.new_version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
