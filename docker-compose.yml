
services:
  containrdog:
    image: ghcr.io/vaggeliskls/containrdog:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: containrdog
    restart: unless-stopped
    # Run as non-root user (UID:GID 1000:1000)
    # Add supplementary groups to access docker socket
    user: "1000:1000"
    group_add:
      - "0"  # Add root group for Docker socket access (common on Docker Desktop)
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./package.json
    # Mount Docker socket and credentials
    volumes:
      # Docker socket (required)
      - /var/run/docker.sock:/var/run/docker.sock

      # Docker config for registry authentication (optional)
      # Replace <PATH_TO_HOME_DIR> with your actual home directory
      # - <PATH_TO_HOME_DIR>/.docker/config.json:/config.json:ro

      # For Podman (uncomment if using Podman instead of Docker)
      # - /run/podman/podman.sock:/var/run/docker.sock

    environment:
      # Check interval (supports: "5s", "5m", or "5" for minutes)
      - INTERVAL=5s

      # Only monitor containers with specific label (default: true)
      - LABELED=true

      # Label name to check for when LABELED=true
      - LABEL=containrdog-enabled

      # Global update policy (default: major)
      # Options: all, major, minor, patch, force, glob
      # Can be overridden per container with containrdog.policy label
      - POLICY=major

      # For glob policy: specify pattern
      # - GLOB_PATTERN=1.2*

      # For force policy: match only same tag
      # - MATCH_TAG=true

      # Auto-update containers when new versions are found (default: true)
      # Set to false to only detect and log updates without taking action
      - AUTO_UPDATE=true

      # Custom socket path (optional, auto-detected)
      # - SOCKET_PATH=/var/run/docker.sock

      # Log level: error, warn, info, debug (default: info)
      - LOG_LEVEL=info

      # Global custom commands (optional - JSON array)
      # Available environment variables: CONTAINER_ID, CONTAINER_NAME, CURRENT_IMAGE,
      # CURRENT_TAG, AVAILABLE_IMAGE, AVAILABLE_TAG, UPDATE_TYPE

      # DEPRECATED: Use PRE_UPDATE_COMMANDS and POST_UPDATE_COMMANDS instead
      # - UPDATE_COMMANDS=["echo 'Update found for $CONTAINER_NAME: $CURRENT_TAG -> $AVAILABLE_TAG'"]

      # Pre-update commands: Execute BEFORE pulling and recreating container
      # - PRE_UPDATE_COMMANDS=["echo 'Starting update for $CONTAINER_NAME'", "docker exec $CONTAINER_NAME /app/backup.sh"]

      # Post-update commands: Execute AFTER successful container update
      # - POST_UPDATE_COMMANDS=["echo 'Updated $CONTAINER_NAME to $AVAILABLE_TAG'", "docker exec $CONTAINER_NAME /app/healthcheck.sh"]

      # Webhook notifications (optional)
      # Enable webhook notifications
      # - WEBHOOK_ENABLED=true

      # Webhook URL (required if webhooks enabled)
      # - WEBHOOK_URL=https://hooks.slack.com/services/YOUR/WEBHOOK/URL

      # Webhook provider: slack, discord, teams, generic (default: generic)
      # - WEBHOOK_PROVIDER=slack

      # Notification preferences (all default to their shown values)
      # - WEBHOOK_NOTIFY_SUCCESS=true    # Notify when update succeeds
      # - WEBHOOK_NOTIFY_FAILURE=true    # Notify when update fails
      # - WEBHOOK_NOTIFY_CHECK=false     # Notify on every check cycle

      # GitOps Configuration - Monitor a Git repository for configuration changes
      - GITOPS_ENABLED=true
      - GITOPS_REPO_URL=https://github.com/vaggeliskls/webdav-server
      - GITOPS_BRANCH=main
      # - GITOPS_AUTH_TYPE=token  # or 'ssh' or 'none'
      # - GITOPS_TOKEN=ghp_your_token_here
      # - GITOPS_SSH_KEY_PATH=/config/id_rsa
      - GITOPS_POLL_INTERVAL=5s
      # - GITOPS_WATCH_PATHS=["docker-compose.yml", "config/**/*.env"]
      - GITOPS_COMMANDS=["ls -la"]
      - GITOPS_CLONE_PATH=/tmp/webdav-server

      # AWS ECR Configuration - Automatic authentication with AWS Elastic Container Registry
      # Enable ECR authentication (default: false)
      # - ECR_ENABLED=true

      # AWS Region (required if ECR_ENABLED=true)
      # Can use ECR_REGION, AWS_REGION, or AWS_DEFAULT_REGION
      # - ECR_REGION=eu-west-2
      # - AWS_REGION=eu-west-2

      # AWS Credentials (optional - uses IAM role if not provided)
      # Can use ECR_ACCESS_KEY_ID/ECR_SECRET_ACCESS_KEY or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY
      # - ECR_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
      # - ECR_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      # - AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
      # - AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

      # ECR token refresh interval (default: 6h, ECR tokens expire in 12h)
      # Supports: "6h", "30m", "3600s"
      # - ECR_AUTH_REFRESH_INTERVAL=6h

      # ECR registries to authenticate (optional - comma-separated list)
      # If not specified, will auto-detect from ECR_ACCOUNT_ID or AWS_ACCOUNT_ID
      # - ECR_REGISTRIES=123456789012.dkr.ecr.us-east-1.amazonaws.com,987654321098.dkr.ecr.eu-west-1.amazonaws.com

      # AWS Account ID (optional - used to auto-generate registry URL)
      # - ECR_ACCOUNT_ID=123456789012
      # - AWS_ACCOUNT_ID=123456789012

    labels:
      # Prevent self-monitoring
      - containrdog-enabled=false

  # Example: A monitored container with major policy and auto-update enabled
  nginx-example:
    image: nginx:1.25
    container_name: nginx-example
    restart: unless-stopped
    ports:
      - '8080:80'
    labels:
      # Enable monitoring for this container (when LABELED=true)
      - containrdog-enabled=true

      # Update policy: all, major, minor, patch, force, glob (default: uses global POLICY)
      # - containrdog.policy=major

      # Auto-update this container (default: uses global AUTO_UPDATE)
      - containrdog.auto-update=true

      # Per-container custom commands (optional - overrides global commands)
      # DEPRECATED: Use pre-update-commands and post-update-commands instead
      # - containrdog.update-commands=["echo 'Updating $CONTAINER_NAME'"]

      # Per-container pre-update commands (runs before update)
      # - containrdog.pre-update-commands=["echo 'Starting update for $CONTAINER_NAME'"]

      # Per-container post-update commands (runs after successful update)
      # - containrdog.post-update-commands=["echo 'Updated $CONTAINER_NAME'", "curl -X POST https://hooks.slack.com/..."]

      # For glob policy, specify pattern (e.g., 1.2*)
      - containrdog.glob-pattern=1.2*

      # For force policy with match-tag
      # - containrdog.match-tag=true

      # GitOps configuration per container
      # Option 1: Use global repository with specific watch paths
      # - containrdog.gitops-enabled=true
      # - containrdog.gitops-watch-paths=["services/nginx/**", "config/nginx.conf"]
      # - containrdog.gitops-commands=["docker exec nginx nginx -s reload"]

      # Option 2: Use dedicated repository for this container
      # - containrdog.gitops-enabled=true
      # - containrdog.gitops-repo-url=https://github.com/user/nginx-config.git
      # - containrdog.gitops-branch=main
      # - containrdog.gitops-auth-type=token
      # - containrdog.gitops-token=ghp_xxxxx
      # - containrdog.gitops-poll-interval=30s
      # - containrdog.gitops-watch-paths=["**/*.conf"]
      # - containrdog.gitops-commands=["docker cp /tmp/gitops-nginx/nginx.conf nginx:/etc/nginx/", "docker exec nginx nginx -s reload"]
      # - containrdog.gitops-clone-path=/tmp/gitops-nginx
