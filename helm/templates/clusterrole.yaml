{{- if and .Values.rbac.create (not .Values.rbac.existingClusterRoleName) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "containrdog.fullname" . }}
  labels:
    {{- include "containrdog.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "patch"]
{{- with .Values.rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
