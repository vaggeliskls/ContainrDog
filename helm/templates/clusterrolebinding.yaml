{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "containrdog.fullname" . }}
  labels:
    {{- include "containrdog.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "containrdog.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  {{- if .Values.rbac.useClusterAdmin }}
  name: cluster-admin
  {{- else }}
  name: {{ include "containrdog.fullname" . }}
  {{- end }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
