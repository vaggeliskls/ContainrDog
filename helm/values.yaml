image:
  repository: ghcr.io/vaggeliskls/containrdog
  tag: "" # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

# Number of replicas (keep at 1 — multiple replicas would duplicate updates)
replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # if set, bind to this existing ClusterRole instead of creating a custom one (e.g. "admin", "cluster-admin")
  # when set, the custom ClusterRole is NOT created even if rbac.create is true — only the ClusterRoleBinding is created
  existingClusterRoleName: ""
  extraRules: []
  # - apiGroups: [""]
  #   resources: ["namespaces"]
  #   verbs: ["get"]

# ── Core ──────────────────────────────────────────────────────────────────────
config:
  interval: "5m"
  logLevel: "info"
  policy: "major" # all | major | minor | patch | force | glob
  globPattern: "" # used with policy=glob
  autoUpdate: true
  labeled: true # only monitor annotated workloads
  label: "containrdog-enabled"
  # Image labels to display in update notifications (optional).
  # Each label is fetched from the registry for the new image.
  # Silently omitted if a label is not present on the image. e.g.
  #   imageLabel:
  #     - org.opencontainers.image.revision
  #     - org.opencontainers.image.version
  imageLabel: []

  # Timeout in seconds for fetching image label values from the registry (default: 30).
  # Covers the full label fetch operation (manifest + blob fallback).
  labelFetchTimeout: 30

# ── Kubernetes namespaces ─────────────────────────────────────────────────────
kubernetes:
  # List of namespaces to monitor. Must exist in the cluster.
  # Leave empty and set allNamespaces: true to monitor everything.
  namespaces:
    - default
  allNamespaces: false # set true to ignore namespaces list and scan all

# ── Hooks ─────────────────────────────────────────────────────────────────────
hooks:
  preUpdateCommands: [] # e.g. ["echo Starting update for $CONTAINER_NAME"]
  postUpdateCommands: [] # e.g. ["kubectl rollout status deployment/$CONTAINER_NAME"]

# ── Webhooks ──────────────────────────────────────────────────────────────────
webhook:
  enabled: false
  url: "" # set via --set or existingSecret
  provider: "generic" # slack | discord | teams | generic
  notifyOnSuccess: true
  notifyOnFailure: true
  notifyOnCheck: false
  notifyOnGitopsSuccess: true # notify when GitOps commands succeed (default: true)
  notifyOnGitopsFailure: true # notify when GitOps commands fail (default: true)

# ── GitOps ────────────────────────────────────────────────────────────────────
gitops:
  enabled: false
  repoUrl: "" # e.g. "https://github.com/myorg/myrepo.git" or "git@github.com:myorg/myrepo.git"
  branch: "main"
  authType: "none" # token | ssh | none
  token: "" # set via --set gitops.token=xxx or via existingSecret (key: GITOPS_TOKEN)
  sshKeySecret: "" # name of a Secret containing the SSH private key (key: deploy_key)
  sshKeyPath: "/keys/deploy_key" # mount path inside the container
  pollInterval: "60s"
  watchPaths: [] # e.g. ["docker-compose.yml", "config/**"]
  commands: [] # e.g. ["kubectl apply -f $GITOPS_CLONE_PATH/k8s/"]
  # Parent directory for per-container clones. Workloads pointing at the same
  # <namespace, repo, branch> share a single working tree (one fetch, one pull,
  # but each workload runs its own commands). Path layout:
  #   K8s:    <clonePath>/<namespace>-<repo-name>-<branch>
  #   Docker: <clonePath>/<repo-name>-<branch>
  # Default parent: /tmp.
  clonePath: ""
  quietMode: false
  # Clone with --depth 1 to skip repo history. Latest files are still present
  # on disk; commands that read repo files work as before. Recommended for
  # large repos (monorepos, repos with binary assets). Default: false.
  shallow: false

# ── Registry credentials ──────────────────────────────────────────────────────
registry:
  # Recommended: name of an existing kubernetes.io/dockerconfigjson Secret.
  # ContainrDog mounts it and reads credentials from it — same secret you use
  # for imagePullSecrets on your workloads. No duplication needed.
  #
  #   kubectl create secret docker-registry my-pull-secret \
  #     --docker-server=ghcr.io \
  #     --docker-username=myuser \
  #     --docker-password=ghp_token
  #
  existingPullSecret: ""

  # Fallback: raw JSON credentials string (not recommended for production).
  # e.g. '[{"registry":"ghcr.io","username":"user","password":"token"}]'
  credentials: ""

# ── AWS ECR ───────────────────────────────────────────────────────────────────
ecr:
  enabled: false
  region: ""
  accessKeyId: "" # leave empty to use IAM role
  secretAccessKey: ""
  registries: [] # e.g. ["123456789.dkr.ecr.us-east-1.amazonaws.com"]
  accountId: "" # auto-builds registry URL if registries is empty
  authRefreshInterval: "6h"

# ── Sensitive values via existing Secret ─────────────────────────────────────
# Instead of putting secrets in values, reference a pre-created Secret.
# Keys in the secret become env vars in the pod.
existingSecret: ""

# ── Pod settings ──────────────────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
enableServiceLinks: false # disable injection of service env vars into the pod (reduces env noise and avoids conflicts)

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 50m
  #   memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables injected into the pod
extraEnv: []
# - name: MY_VAR
#   value: "my-value"
# - name: SECRET_VAR
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: my-key
#
# Example: set webhook URL from an existing secret (alternative to existingSecret)
# - name: WEBHOOK_URL
#   valueFrom:
#     secretKeyRef:
#       name: my-slack-secret
#       key: slack-webhook-url
