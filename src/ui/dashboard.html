<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContainrDog</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
      --blue: #58a6ff; --purple: #bc8cff; --orange: #ffa657;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; }
    #refresh-info { margin-left: auto; color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 8px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    #status-dot.ok   { background: var(--green); }
    #status-dot.busy { background: var(--yellow); animation: pulse 1s infinite; }
    #status-dot.err  { background: var(--red); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

    /* ── Stat cards ── */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card .val { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .val.green  { color: var(--green); }
    .card .val.yellow { color: var(--yellow); }
    .card .val.blue   { color: var(--blue); }
    .card .val.orange { color: var(--orange); }
    .card .val.muted  { color: var(--muted); }

    /* ── Sections ── */
    section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
    section h2 {
      padding: 12px 16px; font-size: 13px; font-weight: 600;
      border-bottom: 1px solid var(--border); background: var(--surface2);
      display: flex; align-items: center; gap: 8px;
    }
    section h2 .count {
      background: var(--border); color: var(--muted);
      padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 400;
    }

    /* ── Config grid ── */
    .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .cfg { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
    .cfg:last-child { border-bottom: none; }
    .cfg .k { color: var(--muted); font-size: 12px; }
    .cfg .v { font-weight: 500; font-size: 13px; text-align: right; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 9px 16px; text-align: left; font-size: 11px;
      text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface2);
    }
    tbody td { padding: 9px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255, 255, 255, 0.02); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge.green  { background: rgba(63, 185, 80, 0.15);  color: var(--green); }
    .badge.red    { background: rgba(248, 81, 73, 0.15);  color: var(--red); }
    .badge.yellow { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
    .badge.blue   { background: rgba(88, 166, 255, 0.15); color: var(--blue); }
    .badge.purple { background: rgba(188, 140, 255, 0.15);color: var(--purple); }
    .badge.orange { background: rgba(255, 166, 87, 0.15); color: var(--orange); }
    .badge.muted  { background: rgba(139, 148, 158, 0.12);color: var(--muted); }

    /* ── Misc ── */
    .mono  { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 12px; }
    .empty { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 13px; }
    .arrow { color: var(--muted); margin: 0 4px; }
    .ts    { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .tags  { display: flex; flex-wrap: wrap; gap: 4px; }
  </style>
</head>
<body>

<header>
  <span style="font-size:26px;line-height:1">&#x1F43E;</span>
  <div>
    <h1>ContainrDog</h1>
    <div class="sub">Container image update monitor</div>
  </div>
  <div id="refresh-info">
    <span id="status-dot"></span>
    <span id="status-text">Loading&hellip;</span>
    &bull; refresh in <span id="countdown">30</span>s
  </div>
</header>

<main>
  <div class="stat-cards" id="stat-cards"></div>

  <section>
    <h2>&#x2699;&#xFE0F; Configuration</h2>
    <div class="config-grid" id="cfg-grid"></div>
  </section>

  <section>
    <h2>&#x1F4E6; Monitored Containers <span class="count" id="cnt-containers">0</span></h2>
    <div id="containers-wrap"></div>
  </section>

  <section>
    <h2>&#x1F514; Recent Updates <span class="count" id="cnt-updates">0</span></h2>
    <div id="updates-wrap"></div>
  </section>
</main>

<script>
(function () {
  var REFRESH = 30;
  var countdown = REFRESH;
  var timer = null;

  /* ── Helpers ── */

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtMs(ms) {
    if (!ms) return '—';
    if (ms < 60000)   return (ms / 1000).toFixed(0) + 's';
    if (ms < 3600000) return (ms / 60000).toFixed(0) + 'm';
    return (ms / 3600000).toFixed(1) + 'h';
  }

  function fmtTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function fmtDateTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 5)    return 'just now';
    if (diff < 60)   return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  function badge(text, color) {
    return '<span class="badge ' + color + '">' + esc(text) + '</span>';
  }

  function fmtUpdateType(t) {
    switch (t) {
      case 'semantic_version': return badge('semver', 'green');
      case 'digest_change':    return badge('digest', 'blue');
      case 'static_tag':       return badge('static tag', 'orange');
      default:                 return badge(t || '?', 'muted');
    }
  }

  function setInner(id, html) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = html;
  }

  /* ── Renderers ── */

  function renderCards(d) {
    var busy = d.checkInProgress;
    var dot  = document.getElementById('status-dot');
    var txt  = document.getElementById('status-text');
    if (dot) dot.className = busy ? 'busy' : 'ok';
    if (txt) txt.textContent = busy ? 'Checking…' : 'Idle';

    var upSec = Math.floor((Date.now() - new Date(d.startedAt).getTime()) / 1000);
    var upStr = upSec < 60
      ? upSec + 's'
      : upSec < 3600
        ? Math.floor(upSec / 60) + 'm'
        : Math.floor(upSec / 3600) + 'h ' + Math.floor((upSec % 3600) / 60) + 'm';

    var html = '';
    html += '<div class="card"><div class="lbl">Status</div>'
          + '<div class="val ' + (busy ? 'yellow' : 'green') + '">' + (busy ? 'Checking…' : 'Idle') + '</div></div>';
    html += '<div class="card"><div class="lbl">Containers</div>'
          + '<div class="val blue">' + d.containers.length + '</div></div>';
    html += '<div class="card"><div class="lbl">Last Check</div>'
          + '<div class="val">' + esc(timeAgo(d.lastCheckAt)) + '</div></div>';
    html += '<div class="card"><div class="lbl">Next Check</div>'
          + '<div class="val">' + esc(fmtTime(d.nextCheckAt)) + '</div></div>';
    html += '<div class="card"><div class="lbl">Updates Found</div>'
          + '<div class="val ' + (d.recentUpdates.length ? 'orange' : 'muted') + '">' + d.recentUpdates.length + '</div></div>';
    html += '<div class="card"><div class="lbl">Uptime</div>'
          + '<div class="val muted">' + esc(upStr) + '</div></div>';
    setInner('stat-cards', html);
  }

  function renderConfig(cfg) {
    if (!cfg) return;
    var rows = [
      ['Runtime',       badge(cfg.runtime, cfg.runtime === 'kubernetes' ? 'blue' : 'purple')],
      ['Check Interval', esc(fmtMs(cfg.intervalMs))],
      ['Update Policy', badge(cfg.policy, 'orange')],
      ['Auto Update',   cfg.autoUpdate ? badge('enabled', 'green') : badge('disabled', 'muted')],
      ['Labeled Only',  cfg.labeledOnly
        ? badge('yes', 'blue') + '&nbsp; <span class="mono">' + esc(cfg.label) + '</span>'
        : badge('no — all containers', 'muted')],
    ];
    if (cfg.runtime === 'kubernetes' && cfg.namespaces && cfg.namespaces.length) {
      rows.push(['Namespaces', cfg.namespaces.map(function (n) { return badge(n, 'blue'); }).join(' ')]);
    }
    if (cfg.imageLabelKeys && cfg.imageLabelKeys.length) {
      rows.push(['Image Label Keys', cfg.imageLabelKeys.map(function (k) {
        return '<span class="badge muted mono">' + esc(k) + '</span>';
      }).join(' ')]);
    }
    rows.push(['Webhook', cfg.webhookEnabled ? badge(cfg.webhookProvider || 'generic', 'green') : badge('disabled', 'muted')]);
    rows.push(['GitOps',  cfg.gitopsEnabled  ? badge('enabled', 'green') : badge('disabled', 'muted')]);
    rows.push(['AWS ECR', cfg.ecrEnabled     ? badge('enabled', 'green') : badge('disabled', 'muted')]);

    setInner('cfg-grid', rows.map(function (r) {
      return '<div class="cfg"><span class="k">' + r[0] + '</span><span class="v">' + r[1] + '</span></div>';
    }).join(''));
  }

  function renderContainers(containers, runtime) {
    setInner('cnt-containers', String(containers.length));
    if (!containers.length) {
      setInner('containers-wrap', '<div class="empty">No containers currently monitored</div>');
      return;
    }

    var isK8s = runtime === 'kubernetes';
    var head = '<thead><tr><th>Name</th>';
    if (isK8s) head += '<th>Namespace</th><th>Workload</th>';
    head += '<th>Image</th><th>Policy</th><th>Auto Update</th><th>GitOps</th></tr></thead>';

    var rows = containers.map(function (c) {
      var tr = '<tr><td><strong>' + esc(c.name) + '</strong>';
      if (c.containerName && c.containerName !== c.name) {
        tr += '<br><span class="mono" style="color:var(--muted);font-size:11px">' + esc(c.containerName) + '</span>';
      }
      tr += '</td>';

      if (isK8s) {
        tr += '<td>' + (c.namespace ? badge(c.namespace, 'blue') : '<span style="color:var(--muted)">—</span>') + '</td>';
        tr += '<td>';
        if (c.workloadKind && c.workloadName) {
          tr += badge(c.workloadKind, 'muted') + ' <span class="mono" style="font-size:12px">' + esc(c.workloadName) + '</span>';
        } else {
          tr += '<span style="color:var(--muted)">—</span>';
        }
        tr += '</td>';
      }

      tr += '<td class="mono" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(c.image) + '">'
          + esc(c.image) + '</td>';
      tr += '<td>' + badge(c.policy, 'orange') + '</td>';
      tr += '<td>' + (c.autoUpdate ? badge('enabled', 'green') : badge('disabled', 'muted')) + '</td>';
      tr += '<td>';
      var g = c.gitops || {};
      if (g.scope === 'none') {
        tr += badge('off', 'muted');
      } else {
        tr += badge(g.scope === 'per-container' ? 'per-container' : 'global', g.scope === 'per-container' ? 'purple' : 'blue');
        if (g.hasPerContainerCommands) tr += ' ' + badge('custom cmds', 'orange');
        if (g.repoUrl) {
          var shortUrl = g.repoUrl.replace(/^https?:\/\//, '').substring(0, 44);
          tr += '<br><span class="mono" style="font-size:11px;color:var(--muted)" title="' + esc(g.repoUrl) + '">' + esc(shortUrl) + '</span>';
        }
        if (g.branch) {
          tr += '<br><span style="font-size:11px;color:var(--muted)">branch: <span class="mono">' + esc(g.branch) + '</span></span>';
        }
        if (g.pollIntervalMs) {
          tr += '<span style="font-size:11px;color:var(--muted)"> &bull; poll: ' + esc(fmtMs(g.pollIntervalMs)) + '</span>';
        }
        if (g.watchPaths && g.watchPaths.length) {
          var pathStr = g.watchPaths.slice(0, 3).map(function (p) { return esc(p); }).join(', ');
          if (g.watchPaths.length > 3) pathStr += ', +' + (g.watchPaths.length - 3) + ' more';
          tr += '<br><span style="font-size:11px;color:var(--muted)">watch: <span class="mono">' + pathStr + '</span></span>';
        }
      }
      tr += '</td></tr>';
      return tr;
    }).join('');

    setInner('containers-wrap', '<table>' + head + '<tbody>' + rows + '</tbody></table>');
  }

  function renderUpdates(updates) {
    setInner('cnt-updates', String(updates.length));
    if (!updates.length) {
      setInner('updates-wrap', '<div class="empty">No updates recorded yet</div>');
      return;
    }

    var head = '<thead><tr><th>Time</th><th>Container</th><th>Change</th><th>Type</th><th>Action</th><th>Result</th></tr></thead>';
    var rows = updates.map(function (u) {
      var actionBadge, resultBadge;
      if (!u.autoUpdated) {
        actionBadge = badge('skipped', 'muted');
        resultBadge = badge('available', 'yellow');
      } else if (u.success) {
        actionBadge = badge('auto-update', 'green');
        resultBadge = badge('applied', 'green');
      } else {
        actionBadge = badge('auto-update', 'red');
        resultBadge = badge('failed', 'red');
      }

      var tr = '<tr>';
      tr += '<td class="ts" title="' + esc(fmtDateTime(u.timestamp)) + '">' + esc(timeAgo(u.timestamp)) + '</td>';
      tr += '<td><strong>' + esc(u.containerName) + '</strong></td>';
      tr += '<td class="mono">'
          + '<span style="color:var(--muted)">' + esc(u.fromTag) + '</span>'
          + '<span class="arrow">&#x2192;</span>'
          + '<strong>' + esc(u.toTag) + '</strong></td>';
      tr += '<td>' + fmtUpdateType(u.updateType) + '</td>';
      tr += '<td>' + actionBadge + '</td>';
      tr += '<td>' + resultBadge;
      if (u.error) {
        var shortErr = u.error.length > 60 ? u.error.substring(0, 60) + '…' : u.error;
        tr += '<br><span style="font-size:11px;color:var(--red)" title="' + esc(u.error) + '">' + esc(shortErr) + '</span>';
      }
      if (u.labelValues && Object.keys(u.labelValues).length) {
        Object.keys(u.labelValues).forEach(function (k) {
          var shortKey = k.split('.').pop();
          tr += '<br><span style="font-size:11px;color:var(--muted)">'
              + esc(shortKey) + ': <span class="mono">' + esc(u.labelValues[k]) + '</span></span>';
        });
      }
      tr += '</td></tr>';
      return tr;
    }).join('');

    setInner('updates-wrap', '<table>' + head + '<tbody>' + rows + '</tbody></table>');
  }

  function render(d) {
    renderCards(d);
    renderConfig(d.config);
    renderContainers(d.containers || [], d.config && d.config.runtime);
    renderUpdates(d.recentUpdates || []);
  }

  /* ── Fetch & refresh loop ── */

  function fetchStatus() {
    fetch('/api/status')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        render(d);
        countdown = REFRESH;
      })
      .catch(function () {
        var dot = document.getElementById('status-dot');
        var txt = document.getElementById('status-text');
        if (dot) dot.className = 'err';
        if (txt) txt.textContent = 'Unreachable';
      });
  }

  function tick() {
    countdown--;
    var el = document.getElementById('countdown');
    if (el) el.textContent = String(countdown);
    if (countdown <= 0) {
      countdown = REFRESH;
      fetchStatus();
    }
  }

  fetchStatus();
  timer = setInterval(tick, 1000);
})();
</script>

</body>
</html>
